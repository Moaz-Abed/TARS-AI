# Dashboard Screensaver Configuration
# Place this file in the /src folder (project root)

[Location]
latitude = 45.5017
longitude = -73.5673
timezone = America/Montreal
location_name = Montreal

[Language]
# Supported: en, fr, es, de (UI/quotes), jokes also support pt, cs
# Falls back to English if not supported
language = en
country = CA

[Weather]
# celsius or fahrenheit
temp_unit = celsius
# Update interval in seconds
update_interval = 600

[News]
# Update interval in seconds
update_interval = 300
# Maximum news items to fetch
max_items = 30

[Display]
# Boolean values: True/False (or true/false, both work)
show_weather = True
show_forecast = True
show_sun_moon = True
show_news = True
show_clock = True
show_date = True
show_quotes = True
background_animation = True
scroll_speed = 12

[QuoteMode]
# Mode: quotes, jokes, or alternate (alternates between quotes and jokes)
mode = alternate

[Calendar]
# ICS URL from Google Calendar, Outlook, iCloud, etc.
# Get this from your calendar settings (secret/private iCal URL)
# the url looks like this for hotmail https://outlook.live.com/owa/calendar/bab96d66-1fbd-4d27-9bc9sdf4444595d/176fe128-c1b2-4e5b-aee2-e21d320c8ce2/cid-3DCB6BFFF7E242FD/calendar.ics
# For multiple calendars, separate URLs with commas
ics_urls = 
# How many days ahead to show events
days_ahead = 7
# Maximum number of events to display
max_events = 10
# Update interval in seconds
update_interval = 300

[Feed]
# Mode: news, calendar, or alternate (smart alternation based on content)
mode = alternate

# ============================================================================
# QUOTES - Format: quote_N = Quote text here | Author Name
# Add as many quotes as you want, numbered sequentially
# Separate sections for each language: Quotes_en, Quotes_fr, Quotes_es, Quotes_de
# ============================================================================

